name: Clothing Predict Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
        python-version: '3.13'
      - run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest

    