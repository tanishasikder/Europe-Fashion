<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clothing AI Uploader</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: rgb(92, 228, 255);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      color: white;
      text-align: center;
      margin-bottom: 10px;
      font-size: 2.5rem;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.9);
      text-align: center;
      margin-bottom: 30px;
      font-size: 1.1rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .card h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.5rem;
    }

    input[type="file"] {
      display: block;
      width: 100%;
      padding: 12px;
      border: 2px dashed #667eea;
      border-radius: 8px;
      margin-bottom: 20px;
      cursor: pointer;
      transition: all 0.3s;
    }

    input[type="file"]:hover {
      border-color: #764ba2;
      background: #f8f9ff;
    }

    .preview-container {
      width: 100%;
      max-height: 400px;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 8px;
      overflow: hidden;
    }

    #imagePreview {
      display: none;
      max-width: 100%;
      max-height: 400px;
      object-fit: contain;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: rgb(200, 97, 255);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .results, .status {
      margin-top: 20px;
      padding: 15px;
      background: #f8f9ff;
      border-radius: 8px;
      border-left: 4px solid #667eea;
      min-height: 50px;
      display: none;
      text-align: left;
    }

    .results.show, .status.show {
      display: block;
    }

    .results strong, .status strong {
      color: #667eea;
    }

    .hidden {
      display: none;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      text-align: left;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #667eea;
    }

    .error {
      background: #fee;
      border-left-color: #f44;
      color: #c00;
    }

    .success {
      background: #efe;
      border-left-color: #4c4;
      color: #060;
    }

    .loading {
      display: inline-block;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    pre {
      white-space: pre-wrap;
      word-break: break-all;
      font-size: 0.85rem;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI Clothing Analyzer</h1>
    <p class="subtitle">Get Consumer Predictions for Products</p>

    <!-- Image Upload Section -->
    <div class="card">
      <h2>1. Upload Clothing Image</h2>
      <input type="file" id="imageUpload" accept="image/*" />
      <div class="preview-container">
        <img id="imagePreview" alt="Image preview" />
      </div>
    </div>

    <!-- Business Info Form -->
    <div class="card" id="businessFormCard">
      <h2>2. Enter Business Details</h2>
      <form id="businessForm">
        <div class="form-group">
          <label for="size">Size</label>
          <input type="text" id="size" placeholder="e.g. S, M, L, XL" required />
        </div>

        <div class="form-group">
          <label for="catalogPrice">Catalog Price ($)</label>
          <input type="number" id="catalogPrice" step="0.01" placeholder="e.g. 29.99" required />
        </div>

        <div class="form-group">
          <label for="channel">Sales Channel</label>
          <select id="channel" required>
            <option value="">Select channel</option>
            <option value="online">Online</option>
            <option value="retail">Retail</option>
            <option value="wholesale">Wholesale</option>
          </select>
        </div>

        <div class="form-group">
          <label for="originalPrice">Original Price ($)</label>
          <input type="number" id="originalPrice" step="0.01" placeholder="e.g. 39.99" required />
        </div>

        <div class="form-group">
          <label for="unitPrice">Unit Cost ($)</label>
          <input type="number" id="unitPrice" step="0.01" placeholder="e.g. 15.00" required />
        </div>

        <div class="form-group">
          <label for="selectIndex">Select Index</label>
          <input type="number" id="selectIndex" placeholder="e.g. 0" value="0" required />
        </div>

        <button type="submit" id="submitBtn">Evaluate</button>
      </form>
      <div id="submissionStatus" class="status"></div>
    </div>
  </div>

  <script>
    const imageUpload = document.getElementById("imageUpload");
    const imagePreview = document.getElementById("imagePreview");
    const businessForm = document.getElementById("businessForm");
    const submissionStatus = document.getElementById("submissionStatus");
    const submitBtn = document.getElementById("submitBtn");

    // Handle image preview
    imageUpload.addEventListener("change", () => {
      const file = imageUpload.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        imagePreview.src = reader.result;
        imagePreview.style.display = "block";
      };
      reader.readAsDataURL(file);

      // Reset status when new image is selected
      submissionStatus.classList.remove("show", "error", "success");
    });

    // Handle form submission — sends image + params together to /predict
    businessForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const file = imageUpload.files[0];
      if (!file) {
        alert("Please upload a clothing image first.");
        return;
      }

      // Build the ClothingParameters object (wrapped in a 2D matrix as the backend expects)
      const params = {
        size: document.getElementById("size").value,
        catalog_price: parseFloat(document.getElementById("catalogPrice").value),
        channel: document.getElementById("channel").value,
        original_price: parseFloat(document.getElementById("originalPrice").value),
        unit_price: parseFloat(document.getElementById("unitPrice").value)
      };

      const select = parseInt(document.getElementById("selectIndex").value, 10);

      // FastAPI /predict expects:
      //   - file: UploadFile  (multipart)
      //   - matrix: List[List[ClothingParameters]]  (JSON body field)
      //   - select: int  (JSON body field)
      //
      // FastAPI's Body() fields alongside a File() must be sent as multipart form data,
      // with JSON-encoded strings for the complex fields.
      const formData = new FormData();
      formData.append("file", file);
      // matrix is a 2D list — one row with one ClothingParameters object
      formData.append("matrix", JSON.stringify([[params]]));
      formData.append("select", select);

      submitBtn.disabled = true;
      submissionStatus.innerHTML = '<span class="loading">Sending data to backend... 🧠</span>';
      submissionStatus.classList.add("show");
      submissionStatus.classList.remove("error", "success");

      try {
        const res = await fetch("http://localhost:8000/predict", {
          method: "POST",
          body: formData
        });

        if (!res.ok) {
          const errText = await res.text();
          throw new Error(`HTTP ${res.status}: ${errText}`);
        }

        const result = await res.json();

        // Backend returns: [category, color, numerical_outputs]
        const [category, color, numerical_outputs] = result;

        submissionStatus.innerHTML = `
          <strong>Prediction Complete ✅</strong><br><br>
          <strong>Detected Category:</strong> ${category}<br>
          <strong>Detected Color:</strong> ${color}<br><br>
          <strong>Prediction Output:</strong>
          <pre>${JSON.stringify(numerical_outputs, null, 2)}</pre>
        `;
        submissionStatus.classList.add("success");
      } catch (err) {
        console.error("Prediction error:", err);
        submissionStatus.innerHTML = `<strong>Error with Prediction</strong><br><small>${err.message}</small>`;
        submissionStatus.classList.add("error");
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
